name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/final_result.apk

      - name: Get version from pubspec
        run: echo "VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}-${{ github.run_number }}
          name: Blinkit Money v${{ env.VERSION }}
          body: Automated release build
          files: build/app/outputs/flutter-apk/final_result.apk
          token: ${{ secrets.GITHUB_TOKEN }}
